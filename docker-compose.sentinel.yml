# Redis Sentinel HA local setup (ADR-007)
#
# 1 Master + 2 Replicas + 3 Sentinels — operating prod topology.
# Use this when verifying Sentinel client config or failover behaviour.
#
# Usage:
#   docker compose -f docker-compose.sentinel.yml up -d
#   docker exec booking-sentinel-1 redis-cli -p 26379 SENTINEL masters
#   docker compose -f docker-compose.sentinel.yml down
#
# Spring profile to match: src/main/resources/application-local-sentinel.yml
#   ./gradlew bootRun --args='--spring.profiles.active=local-sentinel'
#
# NOTE: This file does NOT include MySQL. Run alongside docker-compose.yml
#   if you need MySQL too:
#     docker compose up -d mysql
#     docker compose -f docker-compose.sentinel.yml up -d

services:
  redis-master:
    image: redis:7-alpine
    container_name: booking-redis-master
    command: redis-server --port 6379
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "PING"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis-replica-1:
    image: redis:7-alpine
    container_name: booking-redis-replica-1
    command: redis-server --port 6380 --replicaof redis-master 6379
    ports:
      - "6380:6380"
    depends_on:
      redis-master:
        condition: service_healthy

  redis-replica-2:
    image: redis:7-alpine
    container_name: booking-redis-replica-2
    command: redis-server --port 6381 --replicaof redis-master 6379
    ports:
      - "6381:6381"
    depends_on:
      redis-master:
        condition: service_healthy

  sentinel-1:
    image: redis:7-alpine
    container_name: booking-sentinel-1
    command: redis-sentinel /etc/redis/sentinel.conf
    ports:
      - "26379:26379"
    volumes:
      - ./docker/sentinel/sentinel.conf:/etc/redis/sentinel.conf
    depends_on:
      redis-master:
        condition: service_healthy

  sentinel-2:
    image: redis:7-alpine
    container_name: booking-sentinel-2
    command: redis-sentinel /etc/redis/sentinel.conf
    ports:
      - "26380:26379"
    volumes:
      - ./docker/sentinel/sentinel.conf:/etc/redis/sentinel.conf
    depends_on:
      redis-master:
        condition: service_healthy

  sentinel-3:
    image: redis:7-alpine
    container_name: booking-sentinel-3
    command: redis-sentinel /etc/redis/sentinel.conf
    ports:
      - "26381:26379"
    volumes:
      - ./docker/sentinel/sentinel.conf:/etc/redis/sentinel.conf
    depends_on:
      redis-master:
        condition: service_healthy
